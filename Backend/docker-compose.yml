version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: msf-postgres
    environment:
      POSTGRES_USER: msf_user
      POSTGRES_PASSWORD: msf_password
      POSTGRES_DB: magdalena_smart_farming
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U msf_user -d magdalena_smart_farming"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: msf-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: msf-backend
    environment:
      DATABASE_URL: postgresql://msf_user:msf_password@postgres:5432/magdalena_smart_farming?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: magdalena-smart-farming-secret-key-2026
      JWT_EXPIRES_IN: 30d
      NODE_ENV: development
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npx prisma generate && npm run dev"

volumes:
  postgres_data:
  redis_data:
